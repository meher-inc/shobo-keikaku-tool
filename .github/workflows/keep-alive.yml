name: Supabase keep-alive

# Supabase 無料プランの自動一時停止（約7日間 DB アクセスが無いと pause）を
# 防ぐためのキープアライブの「二重化」。
#
# 主系統は Vercel Cron（vercel.json → /api/keep-alive、日次）。
# 本ワークフローはその冗長系で、Vercel Cron が万一止まっても Supabase が
# 停止しないよう、GitHub Actions からも独立して /api/keep-alive を叩く。
#
# 注: GitHub のスケジュール実行は、リポジトリに60日間コミットが無いと
#     自動的に無効化される（既存の check-form-updates.yml と同じ制約）。

on:
  schedule:
    # 2日おき 03:30 UTC = 12:30 JST（Vercel Cron の 03:00 UTC とずらす）
    - cron: "30 3 */2 * *"
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping keep-alive endpoint
        run: |
          for i in 1 2 3; do
            if curl -fsS --max-time 30 "https://plan.todokede.jp/api/keep-alive"; then
              echo ""
              echo "keep-alive OK (attempt $i)"
              exit 0
            fi
            echo "attempt $i failed, retrying in 20s..."
            sleep 20
          done
          echo "keep-alive failed after 3 attempts"
          exit 1
